version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: desert
      POSTGRES_PASSWORD: desert
      POSTGRES_DB: desert_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://desert:desert@db:5432/desert_ledger
      FLASK_ENV: development
    volumes:
      - ./backend:/app
      - C:/Users/User:/mnt/host
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
